<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
}
.card {
  background: white;
  padding: 40px;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  width: 320px;
  text-align: center;
}
h2 { margin-bottom: 20px; }
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}
button {
  width: 100%;
  padding: 12px;
  background: #667eea;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 5px;
  cursor: pointer;
}
button:hover { background: #5563d1; }
</style>
</head>
<body>
<div class="card">
  <h2>Student Result System</h2>
  <form method="POST">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
    <p>Don't have an account? <a href="/register">Register</a></p>
  </form>
</div>
</body>
</html>

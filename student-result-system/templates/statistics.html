<!DOCTYPE html>
<html>
<head>
<title>Statistics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; }
body {
  font-family: Arial;
  margin: 0;
  padding: 30px;
  background: #f4f6f9;
}
h2 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
h3 { color: #2c3e50; margin-top: 10px; }

.btn {
  background: #2ecc71;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 15px;
  text-decoration: none;
  display: inline-block;
  margin-bottom: 25px;
}
.btn:hover { background: #27ae60; }

.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 30px;
}
.chart-container {
  background: white;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  padding: 20px;
  position: relative;
  height: 380px;
}
.chart-container-full {
  background: white;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  padding: 20px;
  position: relative;
  height: 420px;
  margin-bottom: 30px;
}
</style>
</head>
<body>

<h2>📈 Result Statistics</h2>
<a href="/dashboard" class="btn">← Back to Dashboard</a>

<div class="chart-row">
  <div class="chart-container">
    <canvas id="resultChart"></canvas>
  </div>
  <div class="chart-container">
    <canvas id="genderChart"></canvas>
  </div>
</div>

<div class="chart-container-full">
  <canvas id="cgpaChart"></canvas>
</div>

<div class="chart-container-full">
  <canvas id="collegeChart"></canvas>
</div>

<script>
// 1. PASS vs FAIL PIE
new Chart(document.getElementById('resultChart'), {
  type: 'pie',
  data: {
    labels: ['Pass', 'Fail'],
    datasets: [{
      data: [{{ pass_count }}, {{ fail_count }}],
      backgroundColor: ['#2ecc71', '#e74c3c']
    }]
  },
  options: {
    plugins: { title: { display: true, text: 'Pass vs Fail', font: { size: 16 } } },
    responsive: true,
    maintainAspectRatio: false
  }
});

// 2. GENDER PASS PERCENTAGE
new Chart(document.getElementById('genderChart'), {
  type: 'bar',
  data: {
    labels: ['Male', 'Female'],
    datasets: [{
      label: 'Pass %',
      data: [{{ male_pass_percent }}, {{ female_pass_percent }}],
      backgroundColor: ['#3498db', '#e91e8c']
    }]
  },
  options: {
    plugins: { title: { display: true, text: 'Pass % by Gender', font: { size: 16 } } },
    responsive: true,
    maintainAspectRatio: false,
    scales: { y: { beginAtZero: true, max: 100 } }
  }
});

// 3. SGPI DISTRIBUTION
new Chart(document.getElementById('cgpaChart'), {
  type: 'bar',
  data: {
    labels: {{ cgpa_labels | safe }},
    datasets: [{
      label: 'Number of Students',
      data: {{ cgpa_values | safe }},
      backgroundColor: '#9b59b6'
    }]
  },
  options: {
    plugins: { title: { display: true, text: 'SGPI Distribution', font: { size: 16 } } },
    responsive: true,
    maintainAspectRatio: false,
    scales: { y: { beginAtZero: true } }
  }
});

// 4. COLLEGE WISE
new Chart(document.getElementById('collegeChart'), {
  type: 'bar',
  data: {
    labels: {{ labels | safe }},
    datasets: [
      { label: 'Pass', data: {{ pass_values | safe }}, backgroundColor: '#2ecc71' },
      { label: 'Fail', data: {{ fail_values | safe }}, backgroundColor: '#e74c3c' }
    ]
  },
  options: {
    indexAxis: 'y',
    plugins: { title: { display: true, text: 'College Wise Results', font: { size: 16 } } },
    responsive: true,
    maintainAspectRatio: false,
    scales: { x: { beginAtZero: true } }
  }
});
</script>

</body>
</html>
